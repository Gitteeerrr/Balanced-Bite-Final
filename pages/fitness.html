<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanced Bite | Fitness & Workouts</title>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #ffa000;
            --dark: #121212;
            --card: #1e1e1e;
            --text-dim: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); color: #fff; }

        /* NAV */
        nav { 
            display: flex; justify-content: space-between; padding: 15px 5%; 
            background: #000; align-items: center; border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.4rem; font-weight: bold; }
        .logo span { color: var(--primary); }
        .nav-link { color: #ccc; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }

        /* BMI SECTION */
        .bmi-section { 
            background: var(--card); padding: 30px; border-radius: 15px; 
            margin-bottom: 50px; border: 1px solid #333; display: flex; flex-wrap: wrap; gap: 30px;
        }
        .bmi-inputs { flex: 1; min-width: 300px; }
        .bmi-display { flex: 1; min-width: 300px; text-align: center; background: #252525; border-radius: 10px; padding: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* WORKOUT GRID */
        .section-title { margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .workout-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .workout-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            transition: 0.3s; border: 1px solid #333;
        }
        .workout-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-content { padding: 20px; }
        .tag { 
            font-size: 0.7rem; padding: 3px 8px; border-radius: 3px; 
            text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: inline-block;
        }
        .strength { background: #b71c1c; }
        .cardio { background: #01579b; }
        .flex { background: #4a148c; }
        
        .workout-card h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .workout-card p { font-size: 0.85rem; color: var(--text-dim); }
        .workout-meta { margin-top: 15px; font-size: 0.8rem; color: var(--primary); font-weight: bold; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">BALANCED<span>BITE</span></div>
        <a href="index.html" class="nav-link">← Back to Dashboard</a>
    </nav>

    <div class="container">
        <h2 class="section-title">Health Assessment</h2>
        <div class="bmi-section">
            <div class="bmi-inputs">
                <h3>BMI Calculator</h3>
                <input type="number" id="weight" placeholder="Weight (kg)">
                <input type="number" id="height" placeholder="Height (cm)">
                <button class="btn" onclick="calc()">Check Metrics</button>
            </div>
            <div class="bmi-display" id="bmi-result">
                <p>Your Result Will Appear Here</p>
            </div>
        </div>

        <h2 class="section-title">Workout Library (15 Routines)</h2>
        <div class="workout-grid" id="workout-container">
            </div>
    </div>

    <script>
        // BMI Logic
        function calc() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value / 100;
            if(w && h) {
                const bmi = (w / (h*h)).toFixed(1);
                document.getElementById('bmi-result').innerHTML = `
                    <p>Your BMI Score</p>
                    <h1 style="font-size: 3rem; color: var(--primary)">${bmi}</h1>
                    <p>Status: ${bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Healthy' : 'Overweight'}</p>
                `;
            }
        }

        // 15 Workouts Data
        const workouts = [
            { name: "Full Body Blast", type: "strength", time: "45 min", desc: "Compound movements to hit every muscle group." },
            { name: "Sprinting Intervals", type: "cardio", time: "20 min", desc: "High-intensity bursts to skyrocket metabolism." },
            { name: "Morning Flow", type: "flex", time: "15 min", desc: "Gentle yoga stretches to start your day right." },
            { name: "Power Push", type: "strength", time: "40 min", desc: "Focused chest, shoulders, and triceps session." },
            { name: "Jump Rope King", type: "cardio", time: "15 min", desc: "Simple equipment, maximum calorie burn." },
            { name: "Deep Glute Stretch", type: "flex", time: "10 min", desc: "Perfect for recovery after a leg day." },
            { name: "Leg Day Destroyer", type: "strength", time: "50 min", desc: "Squats, lunges, and deadlifts for lower body." },
            { name: "Stair Climber Pro", type: "cardio", time: "30 min", desc: "Build endurance and tone legs simultaneously." },
            { name: "Upper Body Mobility", type: "flex", time: "12 min", desc: "Open up your shoulders and thoracic spine." },
            { name: "Core Shredder", type: "strength", time: "15 min", desc: "Planks and rotations for a bulletproof core." },
            { name: "Swimming Laps", type: "cardio", time: "40 min", desc: "Low impact, full-body cardiovascular work." },
            { name: "Post-Work Decompress", type: "flex", time: "20 min", desc: "Relieve tension from sitting at a desk all day." },
            { name: "Dumbbell Only Circuit", type: "strength", time: "30 min", desc: "Minimal gear, maximal muscle engagement." },
            { name: "Burpee Challenge", type: "cardio", time: "10 min", desc: "The ultimate bodyweight endurance test." },
            { name: "Bedtime Yin", type: "flex", time: "15 min", desc: "Slow, deep poses to prepare for restful sleep." }
        ];

        const container = document.getElementById('workout-container');
        workouts.forEach(w => {
            container.innerHTML += `
                <div class="workout-card">
                    <div class="card-content">
                        <span class="tag ${w.type}">${w.type}</span>
                        <h3>${w.name}</h3>
                        <p>${w.desc}</p>
                        <div class="workout-meta">⏱ ${w.time}</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
