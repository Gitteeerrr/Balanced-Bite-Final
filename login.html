<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Balanced Bite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(43deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            background-attachment: fixed;
        }

        .login-card { 
            width: 100%; max-width: 400px; padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; border-radius: 12px;
        }

        .form-control:focus { background: rgba(255, 255, 255, 0.2); color: white; box-shadow: none; border-color: #FFCC70; }

        .btn-login {
            background: #fff; color: #4158D0; font-weight: 700;
            border-radius: 12px; border: none; padding: 12px; transition: all 0.3s ease;
        }

        .btn-login:hover { transform: translateY(-3px); background: #FFCC70; color: #333; }

        .toggle-link { color: #FFCC70; cursor: pointer; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h1 id="main-title" class="fw-bold m-0">Balanced Bite</h1>
        <p id="sub-title" class="small text-uppercase" style="letter-spacing: 2px;">Member Login</p>
    </div>
    
    <div id="login-message"></div>

    <form id="auth-form">
        <div class="mb-3">
            <label class="form-label small">Username</label>
            <input type="text" id="userIn" class="form-control" placeholder="e.g. Grade9Student">
        </div>
        <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" id="passIn" class="form-control" placeholder="••••••••">
        </div>
        
        <button type="button" id="submit-btn" onclick="handleAuth()" class="btn btn-login w-100 mt-2 shadow">Access App</button>
        
        <div class="text-center mt-4 small">
            <span id="toggle-text">Don't have an account?</span> 
            <span class="toggle-link" onclick="toggleMode()">Click Here</span>
        </div>
        <div class="text-center mt-2">
            <a href="index.html" style="color: rgba(255,255,255,0.6); text-decoration: none;">← Home</a>
        </div>
    </form>
</div>

<script>
let isLoginMode = true;

function toggleMode() {
    isLoginMode = !isLoginMode;
    const title = document.getElementById('main-title');
    const sub = document.getElementById('sub-title');
    const btn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');

    if (isLoginMode) {
        title.innerText = "Balanced Bite";
        sub.innerText = "Member Login";
        btn.innerText = "Access App";
        toggleText.innerText = "Don't have an account?";
    } else {
        title.innerText = "Join Us";
        sub.innerText = "Create Master Account";
        btn.innerText = "Register Now";
        toggleText.innerText = "Already a member?";
    }
}

function handleAuth() {
    const user = document.getElementById('userIn').value;
    const pass = document.getElementById('passIn').value;
    const messageArea = document.getElementById('login-message');

    if (isLoginMode) {
        // LOGIN LOGIC
        if (user === "Grade9Student" && pass === "Bite2026") {
            messageArea.innerHTML = `<div class="alert py-2 text-center" style="background: rgba(0,255,0,0.2); color: #fff; border: 1px solid #0f0;">✨ Welcome back! Entering...</div>`;
            // Optional: window.location.href = "index.html"; 
        } else {
            messageArea.innerHTML = `<div class="alert py-2 text-center" style="background: rgba(255,0,0,0.2); color: #fff; border: 1px solid #f00;">⚠️ Wrong credentials. Use the Master Login.</div>`;
        }
    } else {
        // SIGN UP LOGIC (Simulation)
        messageArea.innerHTML = `<div class="alert py-2 text-center" style="background: rgba(255,204,112,0.2); color: #fff; border: 1px solid #FFCC70;">📝 Account created! Please log in with these details.</div>`;
        setTimeout(toggleMode, 2000); // Switch back to login after 2 seconds
    }
}
</script>

</body>
</html>
