<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Balanced Bite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* The Modern Mesh Background */
        body { 
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background-color: #4158D0;
            /* This creates that premium blended look */
            background-image: linear-gradient(43deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            background-attachment: fixed;
        }

        /* The Glass Box */
        .login-card { 
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15); /* Transparent white */
            backdrop-filter: blur(15px); /* The "frosted glass" effect */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 12px;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: none;
            border-color: #FFCC70;
        }

        .btn-login {
            background: #fff;
            color: #4158D0;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            background: #FFCC70;
            color: #333;
        }

        .back-link { color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h1 class="fw-bold m-0">Balanced Bite</h1>
        <p class="small text-uppercase tracking-widest" style="letter-spacing: 2px;">Your Health Journey Starts Here</p>
    </div>
    
    <div id="login-message"></div>

    <form>
        <div class="mb-3">
            <label class="form-label small">Username</label>
            <input type="text" id="userIn" class="form-control" placeholder="Grade9Student">
        </div>
        <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" id="passIn" class="form-control" placeholder="Bite2026">
        </div>
        <button type="button" onclick="handleLogin()" class="btn btn-login w-100 mt-3 shadow">Unlock Dashboard</button>
        
        <div class="text-center mt-4">
            <a href="index.html" class="back-link">← Return to Home</a>
        </div>
    </form>
</div>

<script>
function handleLogin() {
    const user = document.getElementById('userIn').value;
    const pass = document.getElementById('passIn').value;
    const messageArea = document.getElementById('login-message');

    if (user === "Grade9Student" && pass === "Bite2026") {
        messageArea.innerHTML = `<div class="alert py-2 text-center" style="background: rgba(0,255,0,0.2); color: #fff; border: 1px solid #0f0;">✨ Success! Entering App...</div>`;
    } else {
        messageArea.innerHTML = `<div class="alert py-2 text-center" style="background: rgba(255,0,0,0.2); color: #fff; border: 1px solid #f00;">⚠️ Access Denied.</div>`;
    }
}
</script>

</body>
</html>
